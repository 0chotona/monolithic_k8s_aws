

apiVersion: networking.k8s.io/v1

kind: Ingress

metadata:
  name: order-ingress
  namespace: lgcns
  annotations:
    # kubernetes.io/ingress.class: nginx
    # nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
  - host: server.0chotona.store
    http:
      paths:
      # http://server.0chotona.store/
      - path: /
        pathType: Prefix
        backend:
          service:
            name: order-service
            port:
              number: 80
