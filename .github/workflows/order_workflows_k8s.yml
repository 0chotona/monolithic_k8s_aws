name: deploy order

on:
  push:
    branches:
      - main

jobs:
  # job name
  build-and-deploy:

    # runner
    runs-on: ubuntu-latest
    # https://docs.github.com/ko/actions
    steps:
      - name: checkout github
        uses: actions/checkout@v2

      - name: install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.34.1"

      - name: aws configure
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ap-northeast-2

      - name: aws eks cluster update
        run: aws eks update-kubeconfig --region ap-northeast-2 --name lgcns-0chotona-cluster

      - name: aws ecr login
        uses: aws-actions/amazon-ecr-login@v1


      - name: image build and push docker image to ecr 
        env:
          REGISTRY: 933090817123.dkr.ecr.ap-northeast-2.amazonaws.com
          REPOSITORY: order-0chotona-backend
          IMAGE_TAG: latest
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -f Dockerfile .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: kubectl apply
        # .github/workflows 폴더는 가상 폴러기 때문에 위치를 root로 가정
        run: |
          kubectl apply -f k8s/order_redis.yml
          kubectl apply -f k8s/order_deployment.yml
